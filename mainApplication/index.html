<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>%VITE_APP_TITLE%</title>
    <!-- 首屏前与 useTheme 一致，避免亮色闪一下再变暗 -->
    <script>
      ;(function () {
        try {
          var k = 'admin-color-scheme'
          var s = localStorage.getItem(k)
          var dark =
            s === 'dark' ||
            (s !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
    <style>
      #app-splash {
        --splash-primary: #6366f1;
        --splash-accent: #818cf8;
        --splash-glow: rgba(99, 102, 241, 0.38);
        --splash-text: rgba(30, 34, 54, 0.88);
        --splash-muted: rgba(30, 34, 54, 0.45);
        --splash-panel: rgba(255, 255, 255, 0.76);
        --splash-border: rgba(99, 102, 241, 0.2);
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'PingFang SC',
          'Microsoft YaHei',
          sans-serif;
        background: radial-gradient(
            120% 90% at 50% -10%,
            rgba(99, 102, 241, 0.12),
            transparent 55%
          ),
          radial-gradient(
            90% 70% at 100% 80%,
            rgba(129, 140, 248, 0.08),
            transparent 50%
          ),
          linear-gradient(168deg, #f8fafc 0%, #f1f5f9 45%, #eef2ff 100%);
        transition:
          opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          visibility 0.5s;
      }

      html.dark #app-splash {
        --splash-text: rgba(235, 238, 252, 0.92);
        --splash-muted: rgba(200, 206, 230, 0.42);
        --splash-panel: rgba(22, 26, 42, 0.55);
        --splash-border: rgba(129, 140, 248, 0.22);
        background: radial-gradient(
            100% 80% at 50% -15%,
            rgba(99, 102, 241, 0.16),
            transparent 58%
          ),
          radial-gradient(
            80% 60% at 100% 100%,
            rgba(167, 139, 250, 0.08),
            transparent 45%
          ),
          linear-gradient(168deg, #020617 0%, #0f172a 45%, #0c1322 100%);
      }

      #app-splash.app-splash--leave {
        opacity: 0;
        transform: scale(1.02);
        visibility: hidden;
        pointer-events: none;
      }

      .app-splash__aurora {
        position: absolute;
        inset: -40%;
        background: conic-gradient(
          from 220deg at 50% 50%,
          rgba(99, 102, 241, 0.07),
          rgba(129, 140, 248, 0.09),
          rgba(167, 139, 250, 0.06),
          rgba(99, 102, 241, 0.07)
        );
        animation: app-splash-aurora 14s linear infinite;
        pointer-events: none;
      }

      @keyframes app-splash-aurora {
        to {
          transform: rotate(360deg);
        }
      }

      .app-splash__wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding: 2.25rem 2.5rem;
        border-radius: 20px;
        background: var(--splash-panel);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--splash-border);
        box-shadow:
          0 24px 48px rgba(15, 18, 40, 0.08),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      }

      html.dark .app-splash__wrap {
        box-shadow:
          0 28px 56px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      }

      .app-splash__mark {
        position: relative;
        width: 4.25rem;
        height: 4.25rem;
      }

      .app-splash__ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: var(--splash-primary);
        border-right-color: var(--splash-accent);
        opacity: 0.85;
        animation: app-splash-spin 1.1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      }

      .app-splash__ring--2 {
        inset: 6px;
        border-top-color: var(--splash-accent);
        border-right-color: var(--splash-primary);
        animation-duration: 1.65s;
        animation-direction: reverse;
        opacity: 0.55;
      }

      .app-splash__dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 10px;
        height: 10px;
        margin: -5px 0 0 -5px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--splash-primary),
          var(--splash-accent)
        );
        box-shadow: 0 0 20px var(--splash-glow);
        animation: app-splash-pulse 1.4s ease-in-out infinite;
      }

      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes app-splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.88);
          opacity: 0.75;
        }
      }

      .app-splash__title {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--splash-text);
      }

      .app-splash__sub {
        margin: 0;
        margin-top: -0.75rem;
        font-size: 0.8125rem;
        color: var(--splash-muted);
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .app-splash__dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }

      .app-splash__dots i {
        display: block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--splash-accent);
        opacity: 0.35;
        animation: app-splash-bounce 1.2s ease-in-out infinite;
      }

      .app-splash__dots i:nth-child(2) {
        animation-delay: 0.15s;
      }

      .app-splash__dots i:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes app-splash-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      .app-splash__track {
        width: min(220px, 70vw);
        height: 3px;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.14);
        overflow: hidden;
      }

      html.dark .app-splash__track {
        background: rgba(255, 255, 255, 0.08);
      }

      .app-splash__track span {
        display: block;
        height: 100%;
        width: 38%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          var(--splash-primary),
          var(--splash-accent)
        );
        animation: app-splash-bar 1.35s ease-in-out infinite;
      }

      @keyframes app-splash-bar {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(280%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-splash__aurora,
        .app-splash__ring,
        .app-splash__dot,
        .app-splash__dots i,
        .app-splash__track span {
          animation: none !important;
        }
        .app-splash__track span {
          transform: translateX(0);
          width: 100%;
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" class="app-splash" aria-busy="true" aria-live="polite">
      <div class="app-splash__aurora" aria-hidden="true"></div>
      <div class="app-splash__wrap">
        <div class="app-splash__mark" aria-hidden="true">
          <div class="app-splash__ring"></div>
          <div class="app-splash__ring app-splash__ring--2"></div>
          <div class="app-splash__dot"></div>
        </div>
        <p class="app-splash__title">%VITE_APP_TITLE%</p>
        <p class="app-splash__sub">
          正在加载
          <span class="app-splash__dots" aria-hidden="true">
            <i></i><i></i><i></i>
          </span>
        </p>
        <div class="app-splash__track" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
